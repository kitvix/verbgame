<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb Adventure 動詞大冒險</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #4FC3F7;
    --sun: #FFD54F;
    --grass: #66BB6A;
    --correct: #43A047;
    --wrong: #E53935;
    --star: #FF8F00;
    --card-bg: #FFFDE7;
    --purple: #7C4DFF;
    --pink: #F06292;
    --bg: linear-gradient(160deg, #e0f7fa 0%, #fff9c4 60%, #f3e5f5 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .game-header {
    text-align: center;
    margin-bottom: 24px;
    animation: bounceIn .6s ease;
  }
  .game-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: #1565C0;
    text-shadow: 3px 3px 0 #90CAF9;
    letter-spacing: 1px;
  }
  .game-subtitle {
    font-size: 1rem;
    color: #5C6BC0;
    font-weight: 600;
    margin-top: 4px;
  }

  /* ── Score Bar ── */
  .score-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: white;
    border-radius: 50px;
    padding: 10px 28px;
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .score-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 700;
    font-size: 1rem;
  }
  .score-icon { font-size: 1.3rem; }
  .score-num { font-size: 1.3rem; }
  .score-num.green { color: var(--correct); }
  .score-num.red { color: var(--wrong); }
  .score-num.blue { color: #1565C0; }
  .score-num.star { color: var(--star); }
  .progress-wrap {
    display: flex; align-items: center; gap: 8px;
  }
  .progress-bar-bg {
    width: 120px; height: 10px;
    background: #E0E0E0;
    border-radius: 10px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #42A5F5, #7C4DFF);
    border-radius: 10px;
    transition: width .4s ease;
  }

  /* ── Question Card ── */
  .question-card {
    background: white;
    border-radius: 24px;
    padding: 28px 28px 24px;
    max-width: 560px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,.13);
    animation: slideUp .4s ease;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #42A5F5, #7C4DFF, #F06292);
  }
  .q-meta {
    font-size: .82rem;
    color: #9E9E9E;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }
  .q-section-badge {
    display: inline-block;
    background: #EDE7F6;
    color: #512DA8;
    font-size: .75rem;
    font-weight: 700;
    border-radius: 20px;
    padding: 2px 10px;
    margin-left: 8px;
  }
  .question-text {
    font-size: 1.15rem;
    font-weight: 700;
    color: #212121;
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .verb-highlight {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    color: #1565C0;
    background: #E3F2FD;
    border-radius: 12px;
    padding: 2px 14px;
    display: inline-block;
    margin: 4px 0 16px;
  }
  .verb-table-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .verb-cell {
    flex: 1;
    min-width: 80px;
    background: #F5F5F5;
    border-radius: 10px;
    padding: 6px 10px;
    text-align: center;
  }
  .verb-cell .cell-label {
    font-size: .65rem;
    color: #9E9E9E;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .3px;
    margin-bottom: 2px;
  }
  .verb-cell .cell-val {
    font-size: .9rem;
    font-weight: 700;
    color: #37474F;
  }
  .verb-cell.blank-cell { background: #FFF8E1; border: 2px dashed #FFD54F; }
  .verb-cell.blank-cell .cell-val { color: #F9A825; }

  .ask-label {
    font-size: .95rem;
    font-weight: 700;
    color: #5C6BC0;
    margin-bottom: 12px;
  }

  /* ── Choices ── */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .choice-btn {
    background: #F9F9F9;
    border: 2px solid #E0E0E0;
    border-radius: 14px;
    padding: 12px 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #37474F;
    cursor: pointer;
    transition: all .18s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .choice-btn:hover:not(:disabled) {
    background: #E3F2FD;
    border-color: #42A5F5;
    color: #1565C0;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(66,165,245,.25);
  }
  .choice-btn.correct {
    background: #E8F5E9;
    border-color: var(--correct);
    color: #2E7D32;
    animation: popBounce .4s ease;
  }
  .choice-btn.wrong {
    background: #FFEBEE;
    border-color: var(--wrong);
    color: #C62828;
    animation: shake .4s ease;
  }
  .choice-btn.reveal {
    background: #E8F5E9;
    border-color: var(--correct);
    color: #2E7D32;
  }

  /* ── Feedback ── */
  .feedback-box {
    margin-top: 16px;
    border-radius: 14px;
    padding: 12px 16px;
    font-weight: 700;
    font-size: 1rem;
    display: none;
    animation: fadeIn .3s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb {
    background: #E8F5E9;
    color: #1B5E20;
    border: 1.5px solid #A5D6A7;
  }
  .feedback-box.wrong-fb {
    background: #FFEBEE;
    color: #B71C1C;
    border: 1.5px solid #EF9A9A;
  }

  /* ── Next Button ── */
  .next-btn {
    display: none;
    margin-top: 16px;
    width: 100%;
    background: linear-gradient(135deg, #42A5F5, #7C4DFF);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    cursor: pointer;
    letter-spacing: .5px;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 12px rgba(124,77,255,.3);
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(124,77,255,.4); }
  .next-btn.show { display: block; animation: fadeIn .3s ease; }

  /* ── Stars animation ── */
  .star-burst {
    position: fixed;
    pointer-events: none;
    font-size: 2rem;
    animation: starFly 1s ease forwards;
    z-index: 999;
  }
  @keyframes starFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(1.8); }
  }

  /* ── Result Screen ── */
  .result-screen {
    display: none;
    max-width: 520px;
    width: 100%;
    text-align: center;
    animation: bounceIn .6s ease;
  }
  .result-screen.show { display: block; }
  .result-trophy { font-size: 5rem; margin-bottom: 8px; }
  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.4rem;
    color: #1565C0;
    margin-bottom: 4px;
  }
  .result-subtitle { font-size: 1rem; color: #5C6BC0; font-weight: 600; margin-bottom: 24px; }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .result-stat {
    background: white;
    border-radius: 18px;
    padding: 16px 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,.1);
  }
  .result-stat .rs-icon { font-size: 2rem; margin-bottom: 4px; }
  .result-stat .rs-num { font-size: 1.8rem; font-weight: 900; }
  .result-stat .rs-label { font-size: .78rem; color: #757575; font-weight: 600; text-transform: uppercase; }
  .result-stat.green .rs-num { color: var(--correct); }
  .result-stat.red .rs-num { color: var(--wrong); }
  .result-stat.star .rs-num { color: var(--star); }
  .grade-bar {
    background: white;
    border-radius: 18px;
    padding: 18px 24px;
    box-shadow: 0 4px 14px rgba(0,0,0,.1);
    margin-bottom: 20px;
  }
  .grade-text { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: #37474F; }
  .grade-score { font-size: 3rem; font-weight: 900; color: #1565C0; }
  .restart-btn {
    background: linear-gradient(135deg, #42A5F5, #7C4DFF);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 40px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    cursor: pointer;
    letter-spacing: .5px;
    box-shadow: 0 6px 18px rgba(124,77,255,.35);
    transition: transform .15s;
  }
  .restart-btn:hover { transform: translateY(-3px); }

  /* ── Character mascot ── */
  .mascot {
    font-size: 3.5rem;
    margin-bottom: 6px;
    animation: wiggle 2.5s ease-in-out infinite;
  }

  /* ── Animations ── */
  @keyframes bounceIn {
    0% { transform: scale(.7); opacity: 0; }
    70% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes popBounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-6px); }
    40%,80% { transform: translateX(6px); }
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
</style>
</head>
<body>

<div class="game-header">
  <div class="mascot" id="mascot">🦁</div>
  <div class="game-title">Verb Adventure</div>
  <div class="game-subtitle">動詞大冒險 · Learn English Verbs!</div>
</div>

<div class="score-bar">
  <div class="score-item">⭐ <span class="score-num star" id="score">0</span></div>
  <div class="score-item">✅ <span class="score-num green" id="correct-count">0</span></div>
  <div class="score-item">❌ <span class="score-num red" id="wrong-count">0</span></div>
  <div class="progress-wrap">
    <span style="font-size:.82rem;color:#9E9E9E;font-weight:700;">進度</span>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
    <span class="score-num blue" id="prog-text">0/40</span>
  </div>
</div>

<!-- Question Card -->
<div class="question-card" id="question-card">
  <div class="q-meta">
    題目 <span id="q-num">1</span> / 40
    <span class="q-section-badge" id="section-badge">Section I</span>
  </div>
  <div class="question-text">請選出正確答案 👇</div>
  <div class="verb-highlight" id="base-verb">affect 的 Past Participle 是？</div>
  <div class="verb-table-row" id="verb-table"></div>
  <div class="ask-label">選出正確答案 👇</div>
  <div class="choices" id="choices"></div>
  <div class="feedback-box" id="feedback"></div>
  <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
</div>

<!-- Result -->
<div class="result-screen" id="result-screen">
  <div class="result-trophy" id="result-trophy">🏆</div>
  <div class="result-title" id="result-title">太棒了！</div>
  <div class="result-subtitle" id="result-subtitle">You are a Verb Master!</div>
  <div class="grade-bar">
    <div class="grade-text">最終得分</div>
    <div class="grade-score" id="final-score">0</div>
    <div style="font-size:.85rem;color:#9E9E9E;font-weight:600;">分</div>
  </div>
  <div class="result-stats">
    <div class="result-stat green"><div class="rs-icon">✅</div><div class="rs-num" id="r-correct">0</div><div class="rs-label">答對</div></div>
    <div class="result-stat red"><div class="rs-icon">❌</div><div class="rs-num" id="r-wrong">0</div><div class="rs-label">答錯</div></div>
    <div class="result-stat star"><div class="rs-icon">⭐</div><div class="rs-num" id="r-score">0</div><div class="rs-label">積分</div></div>
  </div>
  <button class="restart-btn" onclick="restartGame()">再玩一次 🔄</button>
</div>

<script>
const ALL_VERBS = [
  {base:"affect",pp:"affecting",sp3:"affects",past:"affected",pastPart:"affected",sec:"I"},
  {base:"attend",pp:"attending",sp3:"attends",past:"attended",pastPart:"attended",sec:"I"},
  {base:"book",pp:"booking",sp3:"books",past:"booked",pastPart:"booked",sec:"I"},
  {base:"check",pp:"checking",sp3:"checks",past:"checked",pastPart:"checked",sec:"I"},
  {base:"clear",pp:"clearing",sp3:"clears",past:"cleared",pastPart:"cleared",sec:"I"},
  {base:"compose",pp:"composing",sp3:"composes",past:"composed",pastPart:"composed",sec:"I"},
  {base:"help",pp:"helping",sp3:"helps",past:"helped",pastPart:"helped",sec:"I"},
  {base:"hand",pp:"handing",sp3:"hands",past:"handed",pastPart:"handed",sec:"I"},
  {base:"join",pp:"joining",sp3:"joins",past:"joined",pastPart:"joined",sec:"I"},
  {base:"look",pp:"looking",sp3:"looks",past:"looked",pastPart:"looked",sec:"I"},
  {base:"visit",pp:"visiting",sp3:"visits",past:"visited",pastPart:"visited",sec:"I"},
  {base:"wait",pp:"waiting",sp3:"waits",past:"waited",pastPart:"waited",sec:"I"},
  {base:"perform",pp:"performing",sp3:"performs",past:"performed",pastPart:"performed",sec:"I"},
  {base:"play",pp:"playing",sp3:"plays",past:"played",pastPart:"played",sec:"I"},
  {base:"prepare",pp:"preparing",sp3:"prepares",past:"prepared",pastPart:"prepared",sec:"I"},
  {base:"report",pp:"reporting",sp3:"reports",past:"reported",pastPart:"reported",sec:"I"},
  {base:"start",pp:"starting",sp3:"starts",past:"started",pastPart:"started",sec:"I"},
  {base:"support",pp:"supporting",sp3:"supports",past:"supported",pastPart:"supported",sec:"I"},
  {base:"use",pp:"using",sp3:"uses",past:"used",pastPart:"used",sec:"I"},
  {base:"watch",pp:"watching",sp3:"watches",past:"watched",pastPart:"watched",sec:"I"},
  {base:"let",pp:"letting",sp3:"lets",past:"let",pastPart:"let",sec:"II"},
  {base:"read",pp:"reading",sp3:"reads",past:"read",pastPart:"read",sec:"II"},
  {base:"become",pp:"becoming",sp3:"becomes",past:"became",pastPart:"become",sec:"III"},
  {base:"come",pp:"coming",sp3:"comes",past:"came",pastPart:"come",sec:"III"},
  {base:"feel",pp:"feeling",sp3:"feels",past:"felt",pastPart:"felt",sec:"IV"},
  {base:"have",pp:"having",sp3:"has",past:"had",pastPart:"had",sec:"IV"},
  {base:"learn",pp:"learning",sp3:"learns",past:"learned",pastPart:"learned",sec:"IV"},
  {base:"make",pp:"making",sp3:"makes",past:"made",pastPart:"made",sec:"IV"},
  {base:"meet",pp:"meeting",sp3:"meets",past:"met",pastPart:"met",sec:"IV"},
  {base:"send",pp:"sending",sp3:"sends",past:"sent",pastPart:"sent",sec:"IV"},
  {base:"teach",pp:"teaching",sp3:"teaches",past:"taught",pastPart:"taught",sec:"IV"},
  {base:"think",pp:"thinking",sp3:"thinks",past:"thought",pastPart:"thought",sec:"IV"},
  {base:"win",pp:"winning",sp3:"wins",past:"won",pastPart:"won",sec:"IV"},
  {base:"be",pp:"being",sp3:"is",past:"was",pastPart:"been",sec:"V"},
  {base:"begin",pp:"beginning",sp3:"begins",past:"began",pastPart:"begun",sec:"V"},
  {base:"do",pp:"doing",sp3:"does",past:"did",pastPart:"done",sec:"V"},
  {base:"fall",pp:"falling",sp3:"falls",past:"fell",pastPart:"fallen",sec:"V"},
  {base:"sing",pp:"singing",sp3:"sings",past:"sang",pastPart:"sung",sec:"V"},
  {base:"take",pp:"taking",sp3:"takes",past:"took",pastPart:"taken",sec:"V"},
  {base:"write",pp:"writing",sp3:"writes",past:"wrote",pastPart:"written",sec:"V"},
];

const FORM_KEYS = ["pp","sp3","past","pastPart"];
const FORM_LABELS = {pp:"Present Participle",sp3:"Simple Present (He/She/It)",past:"Simple Past",pastPart:"Past Participle"};

const MASCOTS = ["🦁","🐯","🦊","🐸","🐼","🦄","🦋","🐙"];
const CHEERS = ["太棒了！✨","Excellent! 🎉","Perfect! 💯","Amazing! 🌟","Super! 🔥","Great job! 👏"];
const WRONGS = ["再試試！💪","Not quite... 😅","Keep going! 🌈","Don't give up! 🦁","Try again! 💡"];

let questions = [];
let qi = 0;
let score = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildQuestions() {
  const verbs = shuffle(ALL_VERBS);
  questions = verbs.map(v => {
    const formKey = FORM_KEYS[Math.floor(Math.random()*FORM_KEYS.length)];
    const answer = v[formKey];

    // Get the other 3 forms of the same verb (excluding the answer, deduplicated)
    const sameVerbForms = [...new Set(FORM_KEYS.filter(k => k !== formKey).map(k => v[k]))].filter(f => f !== answer);

    // If same verb doesn't provide 3 unique distractors, supplement from other verbs' same formKey
    let distractors = [...sameVerbForms];
    if (distractors.length < 3) {
      const extras = shuffle(
        ALL_VERBS.filter(x => x.base !== v.base).map(x => x[formKey]).filter(f => f !== answer && !distractors.includes(f))
      );
      while (distractors.length < 3 && extras.length) distractors.push(extras.shift());
    }

    const choices = shuffle([answer, ...distractors.slice(0, 3)]);
    return {verb: v, formKey, answer, choices};
  });
}

function renderQuestion() {
  const q = questions[qi];
  const v = q.verb;
  answered = false;

  document.getElementById("q-num").textContent = qi+1;
  document.getElementById("section-badge").textContent = "Section " + v.sec;
  document.getElementById("base-verb").textContent = '"' + v.base + '" 的 ' + FORM_LABELS[q.formKey] + ' 是？';

  const tableEl = document.getElementById("verb-table");
  tableEl.innerHTML = "";
  const cols = [
    {key:"base",  label:"Base"},
    {key:"pp",    label:"Pres. Part."},
    {key:"sp3",   label:"Simple Pres."},
    {key:"past",  label:"Simple Past"},
    {key:"pastPart", label:"Past Part."},
  ];
  cols.forEach(c => {
    const div = document.createElement("div");
    div.className = "verb-cell" + (c.key === q.formKey ? " blank-cell" : "");
    div.innerHTML = `<div class="cell-label">${c.label}</div><div class="cell-val">${c.key === q.formKey ? "❓" : v[c.key]}</div>`;
    tableEl.appendChild(div);
  });

  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  q.choices.forEach(ch => {
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.textContent = ch;
    btn.onclick = () => handleAnswer(btn, ch, q.answer);
    choicesEl.appendChild(btn);
  });

  document.getElementById("feedback").className = "feedback-box";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("next-btn").className = "next-btn";

  const pct = (qi / 40 * 100).toFixed(0);
  document.getElementById("prog-fill").style.width = pct + "%";
  document.getElementById("prog-text").textContent = qi + "/40";
}

function handleAnswer(btn, chosen, answer) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll(".choice-btn");
  allBtns.forEach(b => b.disabled = true);

  const feedbackEl = document.getElementById("feedback");

  if (chosen === answer) {
    btn.classList.add("correct");
    score += 10;
    correctCount++;
    feedbackEl.className = "feedback-box correct-fb show";
    feedbackEl.innerHTML = "🎉 " + CHEERS[Math.floor(Math.random()*CHEERS.length)] + " <b>+10分</b>";
    burstStars(btn);
    document.getElementById("mascot").textContent = MASCOTS[Math.floor(Math.random()*MASCOTS.length)];
  } else {
    btn.classList.add("wrong");
    score = Math.max(0, score - 3);
    wrongCount++;
    feedbackEl.className = "feedback-box wrong-fb show";
    feedbackEl.innerHTML = "😢 " + WRONGS[Math.floor(Math.random()*WRONGS.length)] + " <b>-3分</b><br>✅ 正確答案是：<b>" + answer + "</b>";
    allBtns.forEach(b => { if (b.textContent === answer) b.classList.add("reveal"); });
  }

  updateScoreBar();
  document.getElementById("next-btn").className = "next-btn show";
}

function updateScoreBar() {
  document.getElementById("score").textContent = score;
  document.getElementById("correct-count").textContent = correctCount;
  document.getElementById("wrong-count").textContent = wrongCount;
}

function burstStars(btn) {
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  ["⭐","✨","🌟","💫"].forEach((s,i) => {
    const el = document.createElement("div");
    el.className = "star-burst";
    el.textContent = s;
    const angle = (i/4)*Math.PI*2;
    el.style.setProperty("--tx", Math.cos(angle)*80+"px");
    el.style.setProperty("--ty", Math.sin(angle)*80+"px");
    el.style.left = cx+"px";
    el.style.top = cy+"px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1000);
  });
}

function nextQuestion() {
  qi++;
  if (qi >= 40) {
    showResult();
  } else {
    document.getElementById("question-card").style.animation = "none";
    requestAnimationFrame(()=>{
      document.getElementById("question-card").style.animation = "slideUp .4s ease";
      renderQuestion();
    });
  }
}

function showResult() {
  document.getElementById("question-card").style.display = "none";
  const rs = document.getElementById("result-screen");
  rs.className = "result-screen show";

  const pct = Math.round(correctCount/40*100);
  let trophy = "🏆", title = "完美！Verb Master!", subtitle = "You got everything right! Outstanding!";
  if (pct >= 90) { trophy = "🏆"; title = "Verb Master!"; subtitle = "Incredible! You're a grammar superstar! ⭐"; }
  else if (pct >= 70) { trophy = "🥇"; title = "Very Good!"; subtitle = "Almost perfect! Keep it up! 💪"; }
  else if (pct >= 50) { trophy = "🥈"; title = "Good try!"; subtitle = "You're getting there! Practice more! 📚"; }
  else { trophy = "🥉"; title = "Keep learning!"; subtitle = "Don't give up — every mistake helps you grow! 🌱"; }

  document.getElementById("result-trophy").textContent = trophy;
  document.getElementById("result-title").textContent = title;
  document.getElementById("result-subtitle").textContent = subtitle;
  document.getElementById("final-score").textContent = score;
  document.getElementById("r-correct").textContent = correctCount;
  document.getElementById("r-wrong").textContent = wrongCount;
  document.getElementById("r-score").textContent = score;

  for (let i=0;i<20;i++) {
    setTimeout(()=>{
      const el = document.createElement("div");
      el.className = "star-burst";
      el.textContent = ["🎉","⭐","🌟","✨","🎊"][Math.floor(Math.random()*5)];
      el.style.setProperty("--tx", (Math.random()*200-100)+"px");
      el.style.setProperty("--ty", (Math.random()*-200-50)+"px");
      el.style.left = (20+Math.random()*60)+"vw";
      el.style.top = (30+Math.random()*40)+"vh";
      el.style.fontSize = (1.5+Math.random()*2)+"rem";
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), 1000);
    }, i*80);
  }
}

function restartGame() {
  qi = 0; score = 0; correctCount = 0; wrongCount = 0;
  updateScoreBar();
  document.getElementById("prog-fill").style.width = "0%";
  document.getElementById("prog-text").textContent = "0/40";
  document.getElementById("result-screen").className = "result-screen";
  document.getElementById("question-card").style.display = "block";
  buildQuestions();
  renderQuestion();
}

buildQuestions();
renderQuestion();
</script>
</body>
</html>
